<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>インタラクティブ台形変形ツール</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        
        .file-input-label {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-block;
        }
        
        .file-input-label:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        button {
            background: #10b981;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .reset-btn {
            background: #f59e0b;
        }
        
        .reset-btn:hover {
            background: #d97706;
        }
        
        .canvas-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .canvas-wrapper {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .canvas-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 8px;
            background: white;
            cursor: crosshair;
        }
        
        .instructions {
            background: #e0e7ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #1e1b4b;
        }
        
        .instructions h3 {
            margin-bottom: 8px;
            font-size: 16px;
        }
        
        .instructions ul {
            margin-left: 20px;
            line-height: 1.8;
        }
        
        .info-panel {
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            font-size: 13px;
            color: #166534;
        }
        
        @media (max-width: 1024px) {
            .canvas-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 インタラクティブ台形変形ツール</h1>
        <p class="subtitle">4つの角をドラッグして、リアルタイムで画像を変形</p>
        
        <div class="instructions">
            <h3>📖 使い方</h3>
            <ul>
                <li>画像ファイルを選択してください（JPG、PNG対応）</li>
                <li>左側のキャンバスで<strong>青い丸（●）</strong>をドラッグして変形させます</li>
                <li>右側に変形後の画像がリアルタイムで表示されます</li>
                <li>「リセット」で元の位置に戻ります</li>
                <li>「透過PNG保存」で変形後の画像をダウンロードできます</li>
            </ul>
        </div>
        
        <div class="controls">
            <div class="file-input-wrapper">
                <input type="file" id="imageInput" accept="image/*">
                <label for="imageInput" class="file-input-label">📁 画像を選択</label>
            </div>
            <button id="resetBtn" disabled>🔄 リセット</button>
            <button id="downloadBtn" disabled>💾 透過PNG保存</button>
        </div>
        
        <div class="canvas-container">
            <div class="canvas-wrapper">
                <div class="canvas-title">🎯 変形前（角をドラッグ）</div>
                <canvas id="sourceCanvas"></canvas>
                <div class="info-panel">
                    💡 青い丸をドラッグして自由に配置できます
                </div>
            </div>
            <div class="canvas-wrapper">
                <div class="canvas-title">✨ 変形後（プレビュー）</div>
                <canvas id="resultCanvas"></canvas>
                <div class="info-panel">
                    ⚡ リアルタイムで変形が反映されます
                </div>
            </div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const sourceCanvas = document.getElementById('sourceCanvas');
        const resultCanvas = document.getElementById('resultCanvas');
        const resetBtn = document.getElementById('resetBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const sourceCtx = sourceCanvas.getContext('2d');
        const resultCtx = resultCanvas.getContext('2d');
        
        let img = null;
        let points = [];
        let originalPoints = [];
        let draggingPoint = null;
        let canvasScale = 1;
        
        // 画像読み込み
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                img = new Image();
                img.onload = () => {
                    initializeCanvas();
                    resetBtn.disabled = false;
                    downloadBtn.disabled = false;
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
        
        function initializeCanvas() {
            // キャンバスサイズを設定（最大600px幅に制限）
            const maxWidth = 600;
            canvasScale = Math.min(1, maxWidth / img.width);
            
            sourceCanvas.width = img.width * canvasScale;
            sourceCanvas.height = img.height * canvasScale;
            resultCanvas.width = sourceCanvas.width;
            resultCanvas.height = sourceCanvas.height;
            
            // 初期の4角座標
            const w = sourceCanvas.width;
            const h = sourceCanvas.height;
            
            originalPoints = [
                {x: 0, y: 0},           // 左上
                {x: w, y: 0},           // 右上
                {x: w, y: h},           // 右下
                {x: 0, y: h}            // 左下
            ];
            
            // 変形後の初期座標（俯瞰視点風）
            points = [
                {x: w * 0.2, y: h * 0.1},
                {x: w * 0.8, y: h * 0.1},
                {x: w * 1.0, y: h * 0.9},
                {x: w * 0.0, y: h * 0.9}
            ];
            
            draw();
        }
        
        function draw() {
            // 元画像の描画
            sourceCtx.clearRect(0, 0, sourceCanvas.width, sourceCanvas.height);
            sourceCtx.drawImage(img, 0, 0, sourceCanvas.width, sourceCanvas.height);
            
            // 変形領域の描画
            sourceCtx.strokeStyle = '#667eea';
            sourceCtx.lineWidth = 3;
            sourceCtx.setLineDash([5, 5]);
            sourceCtx.beginPath();
            sourceCtx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                sourceCtx.lineTo(points[i].x, points[i].y);
            }
            sourceCtx.closePath();
            sourceCtx.stroke();
            sourceCtx.setLineDash([]);
            
            // 制御点の描画
            points.forEach((point, index) => {
                sourceCtx.fillStyle = '#667eea';
                sourceCtx.strokeStyle = 'white';
                sourceCtx.lineWidth = 3;
                sourceCtx.beginPath();
                sourceCtx.arc(point.x, point.y, 10, 0, Math.PI * 2);
                sourceCtx.fill();
                sourceCtx.stroke();
                
                // 番号表示
                sourceCtx.fillStyle = 'white';
                sourceCtx.font = 'bold 12px sans-serif';
                sourceCtx.textAlign = 'center';
                sourceCtx.textBaseline = 'middle';
                sourceCtx.fillText(index + 1, point.x, point.y);
            });
            
            // 変形後の画像を描画
            applyPerspectiveTransform();
        }
        
        function applyPerspectiveTransform() {
            // 変換行列の計算
            const src = originalPoints.map(p => [p.x, p.y]);
            const dst = points.map(p => [p.x, p.y]);
            const matrix = getPerspectiveTransform(src, dst);
            
            // 変形後のキャンバスをクリア
            resultCtx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
            
            // 変形を適用
            const imageData = sourceCtx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
            const resultImageData = resultCtx.createImageData(resultCanvas.width, resultCanvas.height);
            
            // 逆変換行列を計算
            const invMatrix = invertMatrix(matrix);
            
            // ピクセルごとに変換
            for (let y = 0; y < resultCanvas.height; y++) {
                for (let x = 0; x < resultCanvas.width; x++) {
                    const srcCoords = applyMatrix(invMatrix, x, y);
                    const sx = Math.round(srcCoords[0]);
                    const sy = Math.round(srcCoords[1]);
                    
                    if (sx >= 0 && sx < sourceCanvas.width && sy >= 0 && sy < sourceCanvas.height) {
                        const srcIdx = (sy * sourceCanvas.width + sx) * 4;
                        const dstIdx = (y * resultCanvas.width + x) * 4;
                        
                        resultImageData.data[dstIdx] = imageData.data[srcIdx];
                        resultImageData.data[dstIdx + 1] = imageData.data[srcIdx + 1];
                        resultImageData.data[dstIdx + 2] = imageData.data[srcIdx + 2];
                        resultImageData.data[dstIdx + 3] = 255;
                    }
                }
            }
            
            resultCtx.putImageData(resultImageData, 0, 0);
        }
        
        // 透視変換行列を計算（8パラメータ）
        function getPerspectiveTransform(src, dst) {
            const A = [];
            const b = [];
            
            for (let i = 0; i < 4; i++) {
                const [x, y] = src[i];
                const [u, v] = dst[i];
                
                A.push([x, y, 1, 0, 0, 0, -u*x, -u*y]);
                A.push([0, 0, 0, x, y, 1, -v*x, -v*y]);
                b.push(u);
                b.push(v);
            }
            
            // 連立方程式を解く（簡易版）
            const h = solveLinearSystem(A, b);
            
            return [
                [h[0], h[1], h[2]],
                [h[3], h[4], h[5]],
                [h[6], h[7], 1]
            ];
        }
        
        function solveLinearSystem(A, b) {
            // ガウスの消去法による連立方程式の解法
            const n = b.length;
            const augmented = A.map((row, i) => [...row, b[i]]);
            
            // 前進消去
            for (let i = 0; i < n; i++) {
                let maxRow = i;
                for (let k = i + 1; k < n; k++) {
                    if (Math.abs(augmented[k][i]) > Math.abs(augmented[maxRow][i])) {
                        maxRow = k;
                    }
                }
                [augmented[i], augmented[maxRow]] = [augmented[maxRow], augmented[i]];
                
                for (let k = i + 1; k < n; k++) {
                    const factor = augmented[k][i] / augmented[i][i];
                    for (let j = i; j <= n; j++) {
                        augmented[k][j] -= factor * augmented[i][j];
                    }
                }
            }
            
            // 後退代入
            const x = new Array(n);
            for (let i = n - 1; i >= 0; i--) {
                x[i] = augmented[i][n];
                for (let j = i + 1; j < n; j++) {
                    x[i] -= augmented[i][j] * x[j];
                }
                x[i] /= augmented[i][i];
            }
            
            return x;
        }
        
        function invertMatrix(m) {
            const det = m[0][0] * (m[1][1] * m[2][2] - m[1][2] * m[2][1]) -
                        m[0][1] * (m[1][0] * m[2][2] - m[1][2] * m[2][0]) +
                        m[0][2] * (m[1][0] * m[2][1] - m[1][1] * m[2][0]);
            
            if (Math.abs(det) < 1e-10) return m;
            
            const inv = [
                [
                    (m[1][1] * m[2][2] - m[1][2] * m[2][1]) / det,
                    (m[0][2] * m[2][1] - m[0][1] * m[2][2]) / det,
                    (m[0][1] * m[1][2] - m[0][2] * m[1][1]) / det
                ],
                [
                    (m[1][2] * m[2][0] - m[1][0] * m[2][2]) / det,
                    (m[0][0] * m[2][2] - m[0][2] * m[2][0]) / det,
                    (m[0][2] * m[1][0] - m[0][0] * m[1][2]) / det
                ],
                [
                    (m[1][0] * m[2][1] - m[1][1] * m[2][0]) / det,
                    (m[0][1] * m[2][0] - m[0][0] * m[2][1]) / det,
                    (m[0][0] * m[1][1] - m[0][1] * m[1][0]) / det
                ]
            ];
            
            return inv;
        }
        
        function applyMatrix(m, x, y) {
            const w = m[2][0] * x + m[2][1] * y + m[2][2];
            return [
                (m[0][0] * x + m[0][1] * y + m[0][2]) / w,
                (m[1][0] * x + m[1][1] * y + m[1][2]) / w
            ];
        }
        
        // マウス座標を正確に取得する関数
        function getMousePos(canvas, e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }
        
        // マウスイベント
        sourceCanvas.addEventListener('mousedown', (e) => {
            const pos = getMousePos(sourceCanvas, e);
            
            // クリックした点に近い制御点を探す
            for (let i = 0; i < points.length; i++) {
                const dx = pos.x - points[i].x;
                const dy = pos.y - points[i].y;
                const distance = Math.sqrt(dx*dx + dy*dy);
                
                if (distance < 20) {
                    draggingPoint = i;
                    sourceCanvas.style.cursor = 'grabbing';
                    break;
                }
            }
        });
        
        sourceCanvas.addEventListener('mousemove', (e) => {
            const pos = getMousePos(sourceCanvas, e);
            
            if (draggingPoint !== null) {
                // ドラッグ中
                points[draggingPoint] = {x: pos.x, y: pos.y};
                draw();
            } else {
                // ホバー時のカーソル変更
                let hovering = false;
                for (let i = 0; i < points.length; i++) {
                    const dx = pos.x - points[i].x;
                    const dy = pos.y - points[i].y;
                    const distance = Math.sqrt(dx*dx + dy*dy);
                    
                    if (distance < 20) {
                        hovering = true;
                        break;
                    }
                }
                sourceCanvas.style.cursor = hovering ? 'grab' : 'crosshair';
            }
        });
        
        sourceCanvas.addEventListener('mouseup', () => {
            draggingPoint = null;
            sourceCanvas.style.cursor = 'crosshair';
        });
        
        sourceCanvas.addEventListener('mouseleave', () => {
            draggingPoint = null;
            sourceCanvas.style.cursor = 'crosshair';
        });
        
        // リセットボタン
        resetBtn.addEventListener('click', () => {
            if (img) {
                initializeCanvas();
            }
        });
        
        // ダウンロードボタン
        downloadBtn.addEventListener('click', () => {
            // 元の画像サイズで変形を適用
            const fullCanvas = document.createElement('canvas');
            const fullCtx = fullCanvas.getContext('2d');
            
            // 変形後のサイズを計算
            const scaleBack = 1 / canvasScale;
            const scaledPoints = points.map(p => ({
                x: p.x * scaleBack,
                y: p.y * scaleBack
            }));
            
            // バウンディングボックスを計算
            const minX = Math.min(...scaledPoints.map(p => p.x));
            const maxX = Math.max(...scaledPoints.map(p => p.x));
            const minY = Math.min(...scaledPoints.map(p => p.y));
            const maxY = Math.max(...scaledPoints.map(p => p.y));
            
            fullCanvas.width = Math.ceil(maxX - minX);
            fullCanvas.height = Math.ceil(maxY - minY);
            
            // 変形を適用
            const fullSrc = [
                [0, 0], [img.width, 0], [img.width, img.height], [0, img.height]
            ];
            const fullDst = scaledPoints.map(p => [p.x - minX, p.y - minY]);
            const matrix = getPerspectiveTransform(fullSrc, fullDst);
            const invMatrix = invertMatrix(matrix);
            
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = img.width;
            tempCanvas.height = img.height;
            tempCtx.drawImage(img, 0, 0);
            const srcImageData = tempCtx.getImageData(0, 0, img.width, img.height);
            
            const resultImageData = fullCtx.createImageData(fullCanvas.width, fullCanvas.height);
            
            for (let y = 0; y < fullCanvas.height; y++) {
                for (let x = 0; x < fullCanvas.width; x++) {
                    const srcCoords = applyMatrix(invMatrix, x, y);
                    const sx = Math.round(srcCoords[0]);
                    const sy = Math.round(srcCoords[1]);
                    
                    if (sx >= 0 && sx < img.width && sy >= 0 && sy < img.height) {
                        const srcIdx = (sy * img.width + sx) * 4;
                        const dstIdx = (y * fullCanvas.width + x) * 4;
                        
                        resultImageData.data[dstIdx] = srcImageData.data[srcIdx];
                        resultImageData.data[dstIdx + 1] = srcImageData.data[srcIdx + 1];
                        resultImageData.data[dstIdx + 2] = srcImageData.data[srcIdx + 2];
                        resultImageData.data[dstIdx + 3] = 255;
                    }
                }
            }
            
            fullCtx.putImageData(resultImageData, 0, 0);
            
            // ダウンロード
            fullCanvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'transformed_image.png';
                a.click();
                URL.revokeObjectURL(url);
            }, 'image/png');
        });
    </script>
</body>
</html>
